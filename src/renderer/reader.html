<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Reader</title>
</head>
<body>
  <div id="app">
    <header id="top-bar" class="reader-toolbar">
      <div class="toolbar-left">
  <button id="back-btn" class="toolbar-btn" aria-label="返回書庫" title="返回書庫">
  <span class="toolbar-btn-icon">
    <svg class="toolbar-svg icon-back" viewBox="0 -960 960 960" aria-hidden="true">
      <path d="M560-240 320-480l240-240 56 56-184 184 184 184-56 56Z" fill="currentColor"></path>
    </svg>
  </span>
  <span class="toolbar-btn-label">返回書庫</span>
</button>
</div>

      <div class="toolbar-center">
  <button id="favorite-btn" class="toolbar-icon-btn favorite-toolbar-btn" aria-label="加入我的最愛" title="加入我的最愛">
    <svg class="toolbar-svg icon-favorite" viewBox="0 -960 960 960" aria-hidden="true">
      <path
        id="favorite-icon-path"
        d="M440-501Zm0 381L313-234q-72-65-123.5-116t-85-96q-33.5-45-49-87T40-621q0-94 63-156.5T260-840q52 0 99 22t81 62q34-40 81-62t99-22q81 0 136 45.5T831-680h-85q-18-40-53-60t-73-20q-51 0-88 27.5T463-660h-46q-31-45-70.5-72.5T260-760q-57 0-98.5 39.5T120-621q0 33 14 67t50 78.5q36 44.5 98 104T440-228q26-23 61-53t56-50l9 9 19.5 19.5L605-283l9 9q-22 20-56 49.5T498-172l-58 52Zm280-160v-120H600v-80h120v-120h80v120h120v80H800v120h-80Z"
        fill="currentColor">
      </path>
    </svg>
  </button>

  <button id="fit-toggle-btn" class="toolbar-icon-btn" aria-label="切換適應模式" title="切換適應模式">
    <svg id="fit-icon-svg" class="toolbar-svg icon-fit" viewBox="0 -960 960 960" aria-hidden="true">
      <path
        id="fit-icon-path"
        d="M280-280 80-480l200-200 56 56-103 104h494L624-624l56-56 200 200-200 200-56-56 103-104H233l103 104-56 56Z"
        fill="currentColor">
      </path>
    </svg>
  </button>

  <button id="mode-toggle-btn" class="toolbar-icon-btn" aria-label="切換閱讀模式" title="切換閱讀模式">
    <svg class="toolbar-svg icon-mode" viewBox="0 -960 960 960" aria-hidden="true">
      <path
        id="mode-icon-path"
        d="M260-320q47 0 91.5 10.5T440-278v-394q-41-24-87-36t-93-12q-36 0-71.5 7T120-692v396q35-12 69.5-18t70.5-6Zm260 42q44-21 88.5-31.5T700-320q36 0 70.5 6t69.5 18v-396q-33-14-68.5-21t-71.5-7q-47 0-93 12t-87 36v394Zm-40 118q-48-38-104-59t-116-21q-42 0-82.5 11T100-198q-21 11-40.5-1T40-234v-482q0-11 5.5-21T62-752q46-24 96-36t102-12q58 0 113.5 15T480-740q51-30 106.5-45T700-800q52 0 102 12t96 36q11 5 16.5 15t5.5 21v482q0 23-19.5 35t-40.5 1q-37-20-77.5-31T700-240q-60 0-116 21t-104 59ZM280-494Z"
        fill="currentColor">
      </path>
    </svg>
  </button>

  <button id="autoplay-btn" class="toolbar-icon-btn" aria-label="循環播放" title="循環播放">
    <svg class="toolbar-svg icon-autoplay" viewBox="0 -960 960 960" aria-hidden="true">
      <path
        id="autoplay-icon-path"
        d="M320-200v-560l440 280-440 280Z"
        fill="currentColor">
      </path>
    </svg>
  </button>

  <button id="fullscreen-btn" class="toolbar-icon-btn" aria-label="進入全螢幕" title="進入全螢幕">
    <svg class="toolbar-svg icon-fullscreen" viewBox="0 -960 960 960" aria-hidden="true">
      <path
        id="fullscreen-icon-path"
        d="M120-120v-200h80v120h120v80H120Zm520 0v-80h120v-120h80v200H640ZM120-640v-200h200v80H200v120h-80Zm640 0v-120H640v-80h200v200h-80Z"
        fill="currentColor">
      </path>
    </svg>
  </button>
</div>

      <div class="toolbar-right">
        <input
        id="page-indicator"
        class="toolbar-page-indicator"
        type="text"
        value="1 / 1"
        readonly
        >
      </div>
    </header>

    <main id="reader-shell">
      <div id="reader-container">
        <div id="loading-text" class="pdf-loading">載入中...</div>
        <div id="pdf-pages"></div>  
      </div>
    </main>
  </div>
</body>
</html>
