<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirWei Reader Settings</title>
</head>
<body>
  <div id="app">
    <header class="topbar toolbar">
  <div class="topbar-left">
    <button id="back-btn" class="toolbar-btn" aria-label="返回書庫" title="返回書庫">
      <span class="toolbar-btn-icon" aria-hidden="true">
        <svg class="toolbar-svg icon-back" viewBox="0 -960 960 960">
          <path d="M560-240 320-480l240-240 56 56-184 184 184 184-56 56Z" fill="currentColor"></path>
        </svg>
      </span>
      <span class="toolbar-btn-label">返回書庫</span>
    </button>
  </div>

  <div class="topbar-right">
    <button id="fullscreen-btn" class="toolbar-icon-btn" aria-label="進入全螢幕" title="進入全螢幕">
      <svg class="toolbar-svg icon-fullscreen" viewBox="0 -960 960 960" aria-hidden="true">
        <path
          id="fullscreen-icon-path"
          d="M120-120v-200h80v120h120v80H120Zm520 0v-80h120v-120h80v200H640ZM120-640v-200h200v80H200v120h-80Zm640 0v-120H640v-80h200v200h-80Z"
          fill="currentColor">
        </path>
      </svg>
    </button>
  </div>
</header>

    <main class="layout settings-layout">
      <aside class="detail-panel settings-menu-panel">
        <nav id="settings-menu" class="settings-menu" aria-label="設定項目">
  <button class="settings-item active" data-section="library">
    <span class="settings-item-icon" aria-hidden="true">
      <svg viewBox="0 -960 960 960">
        <path d="M120-40v-880h80v80h560v-80h80v880h-80v-80H200v80h-80Zm80-480h80v-160h240v160h240v-240H200v240Zm0 320h240v-160h240v160h80v-240H200v240Z" fill="currentColor"></path>
      </svg>
    </span>
    <span class="settings-item-label">書庫</span>
  </button>

  <button class="settings-item" data-section="appearance">
    <span class="settings-item-icon" aria-hidden="true">
      <svg viewBox="0 -960 960 960">
        <path d="M649-496.5Q737-513 800-540v400q-60 27-146 43.5T480-80q-88 0-174-16.5T160-140v-400q63 27 151 43.5T480-480q81 0 169-16.5ZM593-833q47 47 47 113t-47 113q-47 47-113 47t-113-47q-47-47-47-113t47-113q47-47 113-47t113 47Z" fill="currentColor"></path>
      </svg>
    </span>
    <span class="settings-item-label">個人化</span>
  </button>

  <button class="settings-item" data-section="history">
    <span class="settings-item-icon" aria-hidden="true">
      <svg viewBox="0 -960 960 960">
        <path d="M480-120q-138 0-240.5-91.5T122-440h82q14 104 92.5 172T480-200q117 0 198.5-81.5T760-480q0-117-81.5-198.5T480-760q-69 0-129 32t-101 88h110v80H120v-240h80v94q51-64 124.5-99T480-840q75 0 140.5 28.5t114 77q48.5 48.5 77 114T840-480q0 75-28.5 140.5t-77 114q-48.5 48.5-114 77T480-120Zm112-192L440-464v-216h80v184l128 128-56 56Z" fill="currentColor"></path>
      </svg>
    </span>
    <span class="settings-item-label">紀錄</span>
  </button>

  <button class="settings-item" data-section="autoplay">
    <span class="settings-item-icon" aria-hidden="true">
      <svg viewBox="0 -960 960 960">
        <path d="m576-160-56-56 104-104-104-104 56-56 104 104 104-104 56 56-104 104 104 104-56 56-104-104-104 104Zm79-360L513-662l56-56 85 85 170-170 56 57-225 226ZM80-280v-80h360v80H80Zm0-320v-80h360v80H80Z" fill="currentColor"></path>
      </svg>
    </span>
    <span class="settings-item-label">閱讀功能細項</span>
  </button>
</nav>
      </aside>

      <section class="library-section settings-content" id="settings-content"></section>
    </main>
  </div>
</body>
</html>
